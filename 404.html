<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>404 - 页面未找到</title>
  <style>
    :root{--bg1:#f8c3ff;--bg2:#c3e7ff}
    html,body{height:100%;margin:0;font-family: "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;overflow:hidden}
    body{
      /* 使用指定背景图，覆盖之前的渐变 */
      background-image: url('https://oss.ericzhao3366.work/blog/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display:flex;align-items:center;justify-content:center;color:#222;-webkit-font-smoothing:antialiased;
      padding-bottom:140px; /* 为固定底部留出空间 */
    }
    /* 容器响应式：使用相对单位并限制最大高度，确保不产生滚动条 */
    .container{
      max-width:960px;
      width:clamp(320px, 86vw, 92%);
      max-height:calc(100vh - 160px);
      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(6px);
      border-radius:20px;padding:clamp(12px,3.5vw,28px);
      display:flex;gap:clamp(12px,2.4vw,24px);align-items:center;box-shadow:0 12px 30px rgba(0,0,0,0.12);
      overflow:visible;
    }
    .img-wrap{flex:0 0 auto}
    .img-wrap img{width:min(38vw,320px);height:auto;border-radius:0;display:block;box-shadow:none;border:0}
    .content{flex:1;min-width:0}
    .big{font-size:clamp(48px,10vw,96px);font-weight:800;margin:0;color:#ef476f;letter-spacing:2px}
    .title{font-size:clamp(16px,2.2vw,20px);margin:8px 0 14px}
    .desc{margin:0 0 18px;color:#444;line-height:1.5}
    .buttons{display:flex;gap:12px;flex-wrap:wrap}
    .btn{display:inline-block;padding:10px 18px;border-radius:10px;text-decoration:none;color:#fff;background:#3b82f6}
    .btn.secondary{background:#6b7280}
    .footer-note{font-size:12px;color:#666;margin-top:12px}
    /* 浮动小光点 */
    .sparkle{position:absolute;border-radius:50%;background:rgba(255,255,255,0.6);box-shadow:0 2px 8px rgba(0,0,0,0.08);animation:float 6s ease-in-out infinite}
    .sparkle.s1{width:12px;height:12px;left:8%;top:18%;animation-duration:5s}
    .sparkle.s2{width:8px;height:8px;left:82%;top:12%;animation-duration:7s}
    .sparkle.s3{width:10px;height:10px;left:62%;top:72%;animation-duration:6s}
    @keyframes float{0%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.15)}100%{transform:translateY(0) scale(1)}}
    @media(max-width:720px){.container{flex-direction:column;text-align:center}.img-wrap{margin-bottom:8px}.big{font-size:clamp(40px,12vw,64px)}}

    /* iOS26 风格固定底部备案条（玻璃质感、圆角长条） */
    .footer-fixed{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      width:calc(100% - 48px);
      max-width:960px;
      background:linear-gradient(180deg, rgba(255,255,255,0.78), rgba(250,250,250,0.65));
      border-radius:999px;
      padding:10px 18px;
      box-shadow:0 12px 30px rgba(20,20,30,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border:1px solid rgba(255,255,255,0.6);
      text-align:center;
      z-index:60;
      font-size:13px;
      color:#333;
      display:block;
    }
    .footer-fixed p{margin:4px 0}
    .footer-fixed a{color:#6b7280;text-decoration:none;margin:0 6px}
    .footer-fixed a:hover{color:#ef476f}
    .footer-fixed .footer-icon{width:16px;vertical-align:middle;margin-right:6px}
  </style>
</head>
<body>
  <div class="sparkle s1"></div>
  <div class="sparkle s2"></div>
  <div class="sparkle s3"></div>

  <div class="container" role="main" aria-labelledby="error-heading">
    <div class="img-wrap">
      <img src="https://oss.ericzhao3366.work/blog/question.png" alt="404">
    </div>
    <div class="content">
      <h1 id="error-heading" class="big">404</h1>
      <div class="title">页面飞到异次元去了…</div>
      <p class="desc">抱歉，你访问的页面不存在或已移除。</p>
      <div class="buttons">
        <a class="btn" href="index.html">返回首页</a>
        <a class="btn secondary" href="javascript:history.back()">返回上一页</a>
      </div>
    </div>
  </div>

  <!-- 底部备案信息，样式参考 index.html -->
  <footer class="footer footer-fixed" aria-label="备案信息">
    <p>© 2026 EricZhao. All Rights Reserved.</p>
    <p>
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">浙ICP备2026008960号-3</a>
      <span>|</span>
      <a href="https://beian.mps.gov.cn/#/query/webSearch?code=33010202005485" rel="noreferrer noopener" target="_blank">
        <img src="gongan.png" alt="公安备案" class="footer-icon"> 浙公网安备33010202005485号
      </a>
    </p>
  </footer>

</body>
</html>
